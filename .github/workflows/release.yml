name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            rpm
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi
          if apt-cache show libayatana-appindicator3-dev >/dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install Dependencies
        working-directory: fronted-tauri
        run: npm install

      - name: Build and Release Tauri App (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: fronted-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Codex Proxy ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."

      - name: Build and Release Tauri App (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: fronted-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Codex Proxy ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          args: --bundles appimage,deb,rpm
